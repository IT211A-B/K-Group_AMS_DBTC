name: Backend CI

on:
  push:
    branches: [main, master, Santos]
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master, Santos]
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Backend.sln

      - name: Build
        run: dotnet build Backend.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Backend.sln --configuration Release --no-build --verbosity normal
